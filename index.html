<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>

    <link rel="stylesheet" href="./assets/css/stylesheet.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <article class="card">
        <div class="card__content">
          <div class="card__image-container">
            <img class="card__image" src="images/image-equilibrium.jpg" />
            <img class="card__image-overlay" src="images/icon-view.svg"/>
          </div>
          <div class="card__details">
            <div class="card__main">
              <h2 class="card__title">Equilibrium #3429</h2>
              <p class="card__desc">
                Our Equilibrium collection promotes balance and calm.
              </p>
            </div>
            <div class="card__info">
              <div class="card__price">
                <img src="/images/icon-ethereum.svg" />
                <p>0.041 ETH</p>
              </div>
              <div class="card__time">
                <img src="images/icon-clock.svg" />
                <p>3 days left</p>
              </div>
            </div>
            <hr class="divider" />
            <div class="card__creator">
              <img src="images/image-avatar.png" />
              <p>Creation of <span>Jules Wyvern</span></p>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
